name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "只重建指定 slug（留空則重建 sites/ 下所有子資料夾）"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "sites/**"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=@webomate/site-spec
          npm run build --workspace=@webomate/renderer

      - name: Build static sites
        env:
          SITE_SLUG: ${{ github.event.inputs.slug }}
        run: node scripts/build-sites.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: sites
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
